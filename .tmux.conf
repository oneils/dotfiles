
# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"


# General
set -g set-clipboard on         # Use system clipboard
set -g detach-on-destroy off    # Don't exit from tmux when closing a session
set -g mouse on                 # Enable mouse support
# set -g status-interval 3        # Update the status bar every 3 seconds (default: 15 seconds). Can be usefull for status bar plugins


# Refresh tmux config with r
unbind r
bind r source-file  ~/.tmux.conf 


# Split horizontally in CWD with \
# unbind %
# bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with -
# unbind \"
# bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"


# Use vim arrow keys to resize
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5


# Enable vi mode to allow us to use vim keys to move around in copy mode (Prefix + [ places us in copy mode)
set-window-option -g mode-keys vi

# Start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection 

# Copy text with "y"
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste yanked text with "Prefix + P" ("Prefix + p" goes to previous window)
bind P paste-buffer
 
# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane


# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on # Automatically renumber windows when one is closed
set-window-option -g pane-base-index 1

set -g status-justify centre
set -g status-right-length 200 #default 10
set -g status-left-length 200 #default 10


# nvim
set-option -g history-limit 25000

# for neovim
set -sg escape-time 10


set -g status-position top



# Switch panes with prefix + h, j, k, l
bind-key h select-pane -L  # Move left
bind-key j select-pane -D  # Move down
bind-key k select-pane -U  # Move up
bind-key l select-pane -R  # Move right


#bind-key -T copy-mode-vi v send-keys -X begin-selection
#bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
#bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# reload configuration
# bind-key -r r source-file ~/.tmux.conf



## FOr images support


# https://github.com/3rd/image.nvim/?tab=readme-ov-file#tmux
# This is needed by the image.nvim plugin
set -gq allow-passthrough on

# This is related to the "tmux_show_only_in_active_window = true,' config in
# image.nvim
# set -g visual-activity off


# ==== TPM - Tmux Plugin Manager ====
# List plugins here, e.g.:
# set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'rose-pine/tmux'
set -g @plugin 'catppuccin/tmux'


set -g status-right-length 100
set -g status-left-length 100

# Rose Pine theme
set -g @rose_pine_variant 'moon'
set -g @rose_pine_directory 'on'
set -g @rose_pine_date_time '%H:%M %d-%b'
 set -g @rose_pine_show_current_program 'on'
# set -g @rose_pine_status_right_append_section '  󰍛 #{cpu_percentage}   #{battery_icon}  #{battery_percentage}  '


set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
# set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"


# Initialize TPM (keep this line at the very bottom of .tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


run ~/.tmux/plugins/tmux-cpu/cpu.tmux
run ~/.tmux/plugins/tmux-battery/battery.tmux

# Copy mode selection highlight (rose-pine moon: highlight-med bg, text fg)
set -g mode-style "fg=#e0def4,bg=#44415a"

# Rounded pill-style window tabs (rose-pine moon colors, must be after TPM)
# Inactive: subtle bg with iris text
set -g window-status-format "#[fg=#393552,bg=#232136]#[fg=#908caa,bg=#393552] #I #W #[fg=#393552,bg=#232136]"
# Active: gold accent
set -g window-status-current-format "#[fg=#f6c177,bg=#232136]#[fg=#232136,bg=#f6c177] #I #W #[fg=#f6c177,bg=#232136]"

